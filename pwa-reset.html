<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PWA 복구</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: #f3f6f4;
        color: #18211d;
        font-family: Pretendard, "Noto Sans KR", sans-serif;
      }

      main {
        width: min(520px, 100%);
        padding: 24px;
        border: 1px solid #d8dedb;
        border-radius: 18px;
        background: #fff;
        box-shadow: 0 10px 28px rgba(24, 33, 29, 0.08);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 22px;
      }

      p {
        margin: 0 0 10px;
        line-height: 1.6;
      }

      #status {
        margin-top: 16px;
        padding: 12px 14px;
        border-radius: 12px;
        background: #eef8f2;
        color: #277552;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>PWA 복구 중</h1>
      <p>앱 캐시와 서비스 워커를 정리한 뒤 메인 페이지로 돌아갑니다.</p>
      <p>몇 초 정도 걸릴 수 있습니다.</p>
      <div id="status">복구를 시작합니다...</div>
    </main>
    <script>
      const status = document.querySelector("#status");

      async function resetPwaState() {
        try {
          status.textContent = "서비스 워커를 정리하는 중...";
          if ("serviceWorker" in navigator) {
            const registrations = await navigator.serviceWorker.getRegistrations();
            await Promise.all(registrations.map((registration) => registration.unregister()));
          }

          status.textContent = "캐시를 비우는 중...";
          if ("caches" in window) {
            const keys = await caches.keys();
            await Promise.all(keys.map((key) => caches.delete(key)));
          }

          status.textContent = "저장된 브라우저 데이터를 정리하는 중...";
          try {
            localStorage.clear();
            sessionStorage.clear();
          } catch {}

          status.textContent = "복구가 끝났습니다. 메인 페이지로 이동합니다...";
          setTimeout(() => {
            window.location.replace("./");
          }, 1200);
        } catch (error) {
          status.textContent = `복구 중 오류가 났습니다: ${error?.message || error}`;
        }
      }

      resetPwaState();
    </script>
  </body>
</html>
